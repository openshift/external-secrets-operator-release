apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/openshift/external-secrets-operator-release?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch
      == "main" && ( "./catalogs/v5.0/***".pathChanged() || ".tekton/external-secrets-operator-index-5-0-push.yaml".pathChanged()
      )
  labels:
    appstudio.openshift.io/application: external-secrets-operator-index-5-0
    appstudio.openshift.io/component: external-secrets-operator-index-5-0
    pipelines.appstudio.openshift.io/type: build
  name: external-secrets-operator-index-5-0-on-push
  namespace: external-secrets-oap-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/external-secrets-oap-tenant/external-secrets-operator-5-0/external-secrets-operator-index-5-0:{{revision}}
  - name: dockerfile
    value: Containerfile
  - name: path-context
    value: catalogs/v5.0
  - name: build-args
    value: []
  pipelineRef:
    name: fbc-build-pipeline
  taskRunTemplate:
    serviceAccountName: build-pipeline-external-secrets-operator-index-5-0
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
